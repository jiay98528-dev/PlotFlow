name: Windows Release Validation

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:
    inputs:
      run_installed:
        description: Run the protected self-hosted installed-app gate
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: windows-release-validation
  cancel-in-progress: false

jobs:
  package-unpacked:
    name: Fresh package, unpacked blackbox and performance
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      PLOTFLOW_REVIEW_EVIDENCE: '1'
    outputs:
      artifact-id: ${{ steps.release-upload.outputs.artifact-id }}
      artifact-url: ${{ steps.release-upload.outputs.artifact-url }}
      artifact-digest: ${{ steps.release-upload.outputs.artifact-digest }}
      artifact-name: plotflow-windows-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm 11.5.1
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build fresh Windows package
        run: pnpm package:win

      - name: Run unpacked blackbox
        run: pnpm --filter @plotflow/app test:e2e:unpacked

      - name: Run unpacked 100, 500 and 1000 node performance journeys
        shell: pwsh
        run: |
          $env:PLOTFLOW_BLACKBOX_TARGET = 'winUnpacked'
          pnpm.cmd --filter @plotflow/app test:e2e:blackbox:perf

      - name: Generate SHA256 manifest
        shell: pwsh
        run: |
          $releaseRoot = (Resolve-Path -LiteralPath 'release').Path
          $files = @(
            Get-ChildItem -LiteralPath 'release' -File -Filter 'Fablevia Setup *.exe'
            Get-ChildItem -LiteralPath 'release/win-unpacked' -File -Filter 'Fablevia.exe'
          ) | Sort-Object FullName
          if ($files.Count -ne 2) {
            throw "Expected one installer and one unpacked executable, found $($files.Count)."
          }
          $lines = foreach ($file in $files) {
            $relative = $file.FullName.Substring($releaseRoot.Length + 1).Replace('\', '/')
            "$(Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256 | Select-Object -ExpandProperty Hash) *$relative"
          }
          $lines | Set-Content -LiteralPath 'release/SHA256SUMS.txt' -Encoding utf8
          Get-Content -LiteralPath 'release/SHA256SUMS.txt'

      - name: Upload package and SHA256 evidence
        id: release-upload
        uses: actions/upload-artifact@v4
        with:
          name: plotflow-windows-${{ github.sha }}
          retention-days: 14
          if-no-files-found: error
          path: |
            release/Fablevia Setup *.exe
            release/Fablevia Setup *.exe.blockmap
            release/win-unpacked/Fablevia.exe
            release/SHA256SUMS.txt

      - name: Upload Playwright failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-failure-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            test-results/**
            packages/app/test-results/**
            playwright-report/**
            packages/app/playwright-report/**

  installed:
    name: Protected installed-app blackbox
    if: github.event_name == 'workflow_dispatch' && inputs.run_installed == true
    needs: package-unpacked
    runs-on: [self-hosted, Windows]
    environment: windows-installed-release
    timeout-minutes: 90
    env:
      PLOTFLOW_REVIEW_EVIDENCE: '1'
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4

      - name: Initialize isolated release path
        shell: powershell
        run: |
          $releasePath = Join-Path $env:RUNNER_TEMP "plotflow-release-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          "PLOTFLOW_VALIDATED_RELEASE=$releasePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup pnpm 11.5.1
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download package from this workflow run
        uses: actions/download-artifact@v4
        with:
          name: plotflow-windows-${{ github.sha }}
          path: ${{ env.PLOTFLOW_VALIDATED_RELEASE }}

      - name: Verify package hashes and install this workflow's candidate
        shell: pwsh
        run: |
          $manifestPath = Resolve-Path -LiteralPath (Join-Path $env:PLOTFLOW_VALIDATED_RELEASE 'SHA256SUMS.txt')
          $manifest = Get-Content -LiteralPath $manifestPath
          $installer = Get-ChildItem -LiteralPath $env:PLOTFLOW_VALIDATED_RELEASE -File -Filter 'Fablevia Setup *.exe' | Select-Object -First 1
          if (-not $installer) { throw 'Downloaded installer is missing.' }
          $installerEntry = $manifest | Where-Object { $_ -like "* *$($installer.Name)" } | Select-Object -First 1
          if (-not $installerEntry) { throw 'Installer is missing from SHA256SUMS.txt.' }
          $expectedInstallerHash = ($installerEntry -split ' ')[0]
          $actualInstallerHash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash
          if ($actualInstallerHash -ne $expectedInstallerHash) { throw 'Installer SHA256 mismatch.' }

          $unpackedEntry = $manifest | Where-Object { $_ -like '* *win-unpacked/Fablevia.exe' } | Select-Object -First 1
          if (-not $unpackedEntry) { throw 'Unpacked executable is missing from SHA256SUMS.txt.' }
          $expectedExecutableHash = ($unpackedEntry -split ' ')[0]
          $installRoot = Join-Path $env:RUNNER_TEMP "PlotFlow-installed-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          $receiptPath = Join-Path $env:PLOTFLOW_VALIDATED_RELEASE 'same-run-install-receipt.json'
          if ($installRoot.StartsWith($env:GITHUB_WORKSPACE, [StringComparison]::OrdinalIgnoreCase)) { throw 'Install root cannot be inside the workspace.' }
          "PLOTFLOW_INSTALL_ROOT=$installRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $installOutput = & powershell.exe -NoProfile -ExecutionPolicy Bypass -File 'scripts/external-review/install-release-candidate.ps1' `
            -Mode Install -InstallerPath $installer.FullName -InstallDir $installRoot -AllowedRoot $env:RUNNER_TEMP `
            -ExpectedExecutableHash $expectedExecutableHash -ReceiptPath $receiptPath
          if ($LASTEXITCODE -ne 0) { throw 'Same-run installer failed.' }
          $installedLine = $installOutput | Where-Object { $_ -like 'INSTALLED_EXE=*' } | Select-Object -Last 1
          if (-not $installedLine) { throw 'Installer helper did not report the installed executable.' }
          $installed = $installedLine.Substring('INSTALLED_EXE='.Length)
          $receiptLine = $installOutput | Where-Object { $_ -like 'INSTALL_RECEIPT=*' } | Select-Object -Last 1
          $receiptHashLine = $installOutput | Where-Object { $_ -like 'INSTALL_RECEIPT_SHA256=*' } | Select-Object -Last 1
          if (-not $receiptLine -or -not $receiptHashLine) { throw 'Installer helper did not emit a same-run receipt.' }
          "PLOTFLOW_INSTALLED_EXE=$installed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PLOTFLOW_INSTALL_RECEIPT=$($receiptLine.Substring('INSTALL_RECEIPT='.Length))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PLOTFLOW_INSTALL_RECEIPT_SHA256=$($receiptHashLine.Substring('INSTALL_RECEIPT_SHA256='.Length))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Collect installed environment and registration evidence
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ARTIFACT_ID: ${{ needs.package-unpacked.outputs.artifact-id }}
          RELEASE_ARTIFACT_URL: ${{ needs.package-unpacked.outputs.artifact-url }}
          RELEASE_ARTIFACT_DIGEST: ${{ needs.package-unpacked.outputs.artifact-digest }}
          RELEASE_ARTIFACT_NAME: ${{ needs.package-unpacked.outputs.artifact-name }}
        run: |
          $installer = Get-ChildItem -LiteralPath $env:PLOTFLOW_VALIDATED_RELEASE -File -Filter 'Fablevia Setup *.exe' | Select-Object -First 1
          if (-not $installer) { throw 'Downloaded installer is missing.' }
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = 'application/vnd.github+json'; 'X-GitHub-Api-Version' = '2022-11-28' }
          $metadata = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$env:RELEASE_ARTIFACT_ID"
          if ([string]$metadata.workflow_run.id -ne '${{ github.run_id }}' -or $metadata.name -ne $env:RELEASE_ARTIFACT_NAME) { throw 'Downloaded artifact metadata does not match this workflow run.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File 'scripts/external-review/collect-windows-evidence.ps1' `
            -Pack install-integrity `
            -InstallerPath $installer.FullName `
            -InstalledExePath $env:PLOTFLOW_INSTALLED_EXE `
            -ReleaseManifestPath (Join-Path $env:PLOTFLOW_VALIDATED_RELEASE 'SHA256SUMS.txt') `
            -InstallReceiptPath $env:PLOTFLOW_INSTALL_RECEIPT `
            -ExpectedReceiptHash $env:PLOTFLOW_INSTALL_RECEIPT_SHA256 `
            -ReleaseArtifactUrl $env:RELEASE_ARTIFACT_URL `
            -ReleaseArtifactSha256 ($env:RELEASE_ARTIFACT_DIGEST -replace '^sha256:', '') `
            -ReleaseArtifactBytes $metadata.size_in_bytes `
            -ReleaseRunId ${{ github.run_id }} `
            -ReleaseRunAttempt ${{ github.run_attempt }} `
            -ReleaseArtifactId $env:RELEASE_ARTIFACT_ID `
            -ReleaseArtifactName $env:RELEASE_ARTIFACT_NAME `
            -AllowMissingObs `
            -AllowExistingProfile

      - name: Run installed blackbox
        run: pnpm --filter @plotflow/app test:e2e:installed

      - name: Silently uninstall and verify cleanup
        if: always()
        shell: pwsh
        run: |
          if ($env:PLOTFLOW_INSTALL_ROOT) {
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File 'scripts/external-review/install-release-candidate.ps1' `
              -Mode Cleanup -InstallDir $env:PLOTFLOW_INSTALL_ROOT -AllowedRoot $env:RUNNER_TEMP `
              -ReceiptPath $env:PLOTFLOW_INSTALL_RECEIPT -ExpectedReceiptHash $env:PLOTFLOW_INSTALL_RECEIPT_SHA256
          }

      - name: Upload installed-gate failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: installed-blackbox-failure-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            test-results/**
            packages/app/test-results/**
            playwright-report/**
            packages/app/playwright-report/**

      - name: Upload installed environment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installed-environment-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 14
          path: test-results/external-review/**
