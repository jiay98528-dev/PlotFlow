name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint check
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript type check
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Production build
        run: pnpm build

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Dependency security audit (moderate+)
        run: pnpm audit --audit-level moderate

  placeholder-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scan for placeholder code (待 M[0-9])
        run: |
          if grep -rn "待 M[0-9]" packages/app/src/; then
            echo "❌ Placeholder code detected! Blocking merge."
            exit 1
          else
            echo "✅ No placeholder code found."
          fi
