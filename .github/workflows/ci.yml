name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint check
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript type check
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Production build
        run: pnpm build

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true  # 已知 Electron 28 不可升级漏洞，不阻断 CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with: { version: 9 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Dependency security audit (moderate+)
        run: pnpm audit --audit-level moderate

  tsx-color-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scan TSX for bare hex colors (excluding var() fallbacks)
        run: |
          # 查找 TSX 内联样式中的裸 hex 色值
          # 排除: var(--*) 回退值、MINIMAP_SVG 标记区域、nodeColor/maskColor 上下文
          VIOLATIONS=$(grep -rn "'#[0-9a-fA-F]\{3,8\}'" packages/app/src/components/ --include='*.tsx' \
            | grep -v "var(--" \
            | grep -v "MINIMAP_SVG" \
            | grep -v "nodeColor\|maskColor" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ TSX bare hex color values found (must use var(--color-*) tokens):"
            echo "$VIOLATIONS"
            exit 1
          else
            echo "✅ No bare hex colors in TSX (all use Design Tokens)"
          fi

  placeholder-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scan for placeholder code (待 M[0-9])
        run: |
          if grep -rn "待 M[0-9]" packages/app/src/; then
            echo "❌ Placeholder code detected! Blocking merge."
            exit 1
          else
            echo "✅ No placeholder code found."
          fi
