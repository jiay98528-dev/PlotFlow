<style>

<script>
var STORY = {"title":"暗夜森林·完整冒险","rootId":"第一章：村庄-森林入口","vars":{"好感度":0,"金币":0,"武器":"无","拥有钥匙":false,"角色状态":{"生命":0,"魔力":0,"体力":0},"阵营":"外来者","谜题解答":0,"龙鳞碎片":0},"nodes":{"第一章：村庄-森林入口":{"id":"森林入口","title":"森林入口","body":"你站在幽暗森林的边缘，两条小径延伸向前。\n夜幕即将降临，乌鸦在枯枝上哀鸣。\n你必须做出选择——勇敢前行，还是退回安全之地。\n\n[选项] 走向左边的狼嚎声 -> 节点：狼穴\n  效果: (好感度+1)\n\n[选项] 探索右边的古井 -> 节点：古井\n\n[选项] 返回村庄 -> 节点：村庄广场","options":[{"text":"走向左边的狼嚎声","target":"第一章：村庄-狼穴","condition":null,"conditionRaw":null,"effects":[{"variableName":"好感度","operation":"add","value":1,"lineNumber":28}]},{"text":"探索右边的古井","target":"第一章：村庄-古井","condition":null,"conditionRaw":null,"effects":[]},{"text":"返回村庄","target":"第一章：村庄-村庄广场","condition":null,"conditionRaw":null,"effects":[]}]},"第一章：村庄-狼穴":{"id":"狼穴","title":"狼穴","body":"洞穴内潮湿阴暗，一双绿眼睛在黑暗中闪烁。\n一头巨狼挡在路前，低吼声在石壁上回荡。\n\n[选项] 战斗 -> 节点：战斗结果\n  效果: (角色状态.生命-10)\n\n[选项] 投喂食物 -> 节点：驯服狼\n  条件: ($金币>=10) AND ($武器!='无')\n  效果: (金币-10, 好感度+5)\n\n[选项] 悄悄退后 -> 节点：森林入口","options":[{"text":"战斗","target":"第一章：村庄-战斗结果","condition":null,"conditionRaw":null,"effects":[{"variableName":"角色状态.生命","operation":"subtract","value":10,"lineNumber":42}]},{"text":"投喂食物","target":"第一章：村庄-驯服狼","condition":{"type":"logical","operator":"AND","operands":[{"type":"comparison","left":{"operandType":"variable","variableName":"金币"},"operator":">=","right":{"operandType":"literal","literalValue":10}},{"type":"comparison","left":{"operandType":"variable","variableName":"武器"},"operator":"!=","right":{"operandType":"literal","literalValue":"无"}}]},"conditionRaw":"($金币>=10) AND ($武器!='无')","effects":[{"variableName":"金币","operation":"subtract","value":10,"lineNumber":45},{"variableName":"好感度","operation":"add","value":5,"lineNumber":45}]},{"text":"悄悄退后","target":"第一章：村庄-森林入口","condition":null,"conditionRaw":null,"effects":[]}]},"第一章：村庄-战斗结果":{"id":"战斗结果","title":"战斗结果","body":"巨狼被你击败，倒在血泊中。\n你在狼穴深处发现了一个被啃咬的铁箱。\n\n[选项] 打开铁箱 -> 节点：获得狼穴宝藏\n  效果: (金币+15, 好感度+2)\n[选项] 离开狼穴 -> 节点：森林入口","options":[{"text":"打开铁箱","target":"第一章：村庄-获得狼穴宝藏","condition":null,"conditionRaw":null,"effects":[{"variableName":"金币","operation":"add","value":15,"lineNumber":58},{"variableName":"好感度","operation":"add","value":2,"lineNumber":58}]},{"text":"离开狼穴","target":"第一章：村庄-森林入口","condition":null,"conditionRaw":null,"effects":[]}]},"第一章：村庄-驯服狼":{"id":"驯服狼","title":"驯服狼","body":"巨狼嗅了嗅你手中的食物，温顺地伏下身。\n它舔了舔你的手，眼中不再有敌意。\n\n[选项] 骑上狼 -> 节点：骑狼探索\n  效果: (好感度+3)\n[选项] 让狼带路 -> 节点：矿坑入口\n  效果: (角色状态.体力+5)","options":[{"text":"骑上狼","target":"第一章：村庄-骑狼探索","condition":null,"conditionRaw":null,"effects":[{"variableName":"好感度","operation":"add","value":3,"lineNumber":69}]},{"text":"让狼带路","target":"第二章：矿坑-矿坑入口","condition":null,"conditionRaw":null,"effects":[{"variableName":"角色状态.体力","operation":"add","value":5,"lineNumber":71}]}]},"第一章：村庄-获得狼穴宝藏":{"id":"获得狼穴宝藏","title":"获得狼穴宝藏","body":"铁箱里装满了金币和一把生锈的匕首。\n虽然匕首已经钝了，但金币足够你在村庄里好好休息一阵。\n\n[选项] 返回村庄 -> 节点：村庄广场\n  效果: (金币+5)","options":[{"text":"返回村庄","target":"第一章：村庄-村庄广场","condition":null,"conditionRaw":null,"effects":[{"variableName":"金币","operation":"add","value":5,"lineNumber":81}]}]},"第一章：村庄-骑狼探索":{"id":"骑狼探索","title":"骑狼探索","body":"巨狼驮着你穿过森林，速度惊人。\n你在狼背上看到了矿坑的方向——那里有奇怪的光。\n\n[选项] 前往矿坑 -> 节点：矿坑入口","options":[{"text":"前往矿坑","target":"第二章：矿坑-矿坑入口","condition":null,"conditionRaw":null,"effects":[]}]},"第一章：村庄-古井":{"id":"古井","title":"古井","body":"井口长满青苔，井水清澈见底。\n井壁上刻着古老的符文，散发着微弱的蓝光。\n\n[选项] 喝井水 -> 节点：井水效果\n  效果: (角色状态.魔力+5)\n\n[选项] 调查符文 -> 节点：符文秘密\n  条件: ($角色状态.魔力>=10)\n  效果: (拥有钥匙=true)\n\n[选项] 离开 -> 节点：森林入口","options":[{"text":"喝井水","target":"第一章：村庄-井水效果","condition":null,"conditionRaw":null,"effects":[{"variableName":"角色状态.魔力","operation":"add","value":5,"lineNumber":100}]},{"text":"调查符文","target":"第一章：村庄-符文秘密","condition":{"type":"comparison","left":{"operandType":"variable","variableName":"角色状态.魔力"},"operator":">=","right":{"operandType":"literal","literalValue":10}},"conditionRaw":"($角色状态.魔力>=10)","effects":[{"variableName":"拥有钥匙","operation":"set","value":true,"lineNumber":103}]},{"tex or(var i=0;i<node.options.length;i++){var o=node.options[i],av=evalCond(o.condition);h+='<button class="option-btn'+(av?'':' option-disabled')+'" data-index="'+i+'"'+(av?'':' disabled')+'>';if(!av)h+='<span class="lock-icon">\ud83d\udd12</span>';h+=esc(o.text)+'</button>';if(!av&&o.conditionRaw){h+='<div class="condition-text">'+esc(o.conditionRaw)+'</div>'}else if(!av&&o.condition){h+='<div class="condition-text">'+esc(serCond(o.condition))+'</div>'}}return h}function choose(opt){if(!opt.target)return;applyEffects(opt.effects);st.cur=opt.target;var tn=S.nodes[opt.target];if(tn)st.crumb.push({id:opt.target,title:tn.title});render()}function renderBC(){var h='';for(var i=0;i<st.crumb.length;i++){var c=st.crumb[i];if(i>0)h+='<span class="crumb-sep">\u203a</span>';if(i===st.crumb.length-1){h+='<span class="crumb-current">'+esc(c.title||'')+'</span>'}else{h+='<a class="crumb-link" data-idx="'+i+'">'+esc(c.title||'')+'</a>'}}bc.innerHTML=h;bc.querySelectorAll('.crumb-link').forEach(function(el){el.onclick=function(){goCrumb(parseInt(this.dataset.idx))}})}function goCrumb(idx){if(idx<0||idx>=st.crumb.length)return;st.cur=st.crumb[idx].id;st.crumb=st.crumb.slice(0,idx+1);render()}function renderVars(){var h='<table class="var-table"><tbody>';for(var k in st.vars){if(st.vars.hasOwnProperty(k)){var v=st.vars[k];if(v!==null&&typeof v==='object'&&!Array.isArray(v)){for(var sk in v){if(v.hasOwnProperty(sk)){h+='<tr><td class="var-key">'+esc(k)+'.'+esc(sk)+'</td><td class="var-val">'+esc(String(v[sk]))+'</td></tr>'}}}else{h+='<tr><td class="var-key">'+esc(k)+'</td><td class="var-val">'+esc(String(v))+'</td></tr>'}}}h+='</tbody></table>';vct.innerHTML=h}vt.onclick=function(){vp.classList.toggle('collapsed');vt.textContent=vp.classList.contains('collapsed')?'\ud83d\udcca \u53d8\u91cf':'\ud83d\udcca \u53d8\u91cf \u25bc'};render()})()
